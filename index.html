<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gist Vis</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; flex-direction: column; color: #24292e; }
    
    #topbar { background: #24292e; color: white; padding: 10px 15px; font-size: 14px; display: flex; gap: 15px; flex-shrink: 0; align-items: center; border-bottom: 1px solid #444; flex-wrap: wrap; }
    .logo-gist { color: #3498db; } .logo-viz { color: #2ecc71; } .logo-container { font-size: 18px; font-weight: bold; margin-right: 5px; }
    #topbar a { color: #adb5bd; text-decoration: none; font-size: 12px; } #topbar a:hover { color: white; text-decoration: underline; }
    
    .main-container { display: flex; flex: 1; overflow: hidden; flex-direction: row; }
    
    #sidebar { width: 220px; background: #f6f8fa; border-right: 1px solid #e1e4e8; overflow-y: auto; flex-shrink: 0; }
    #sidebar ul { list-style: none; padding: 0; margin: 0; }
    #sidebar li { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #e1e4e8; font-size: 12px; font-family: monospace; color: #0366d6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #sidebar li:hover { background: #ebf0f4; } #sidebar li.active { background: #fff; border-left: 4px solid #3498db; color: #24292e; font-weight: bold; }
    
    #content { flex: 1; padding: 20px; overflow-y: auto; background: white; }
    .content-wrapper { max-width: 100%; margin: 0; }
    
    pre { background: #f6f8fa; padding: 12px; border-radius: 6px; border: 1px solid #dfe1e4; overflow: auto; margin: 0; }
    img { max-width: 100%; height: auto; border: 1px solid #ddd; border-radius: 4px; }
    .separator { color: #444; } #file-count { color: #8b949e; font-size: 12px; }
    
    .markdown-body h1, .markdown-body h2 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 0; }
    .markdown-body p { line-height: 1.5; }
    .markdown-body pre { background: #f6f8fa; padding: 12px; border-radius: 6px; border: 1px solid #dfe1e4; overflow: auto; }

    @media (max-width: 768px) {
      .main-container { 
        flex-direction: column;
      }
      
      #sidebar { 
        width: 100%; 
        height: 150px;
        border-right: none; 
        border-bottom: 1px solid #e1e4e8; 
      }

      #topbar #gist-id { 
        display: none;
      
      #content { 
        padding: 15px; 
      }
    }
  </style>
</head>
<body>
  <div id="topbar">
    <div class="logo-container"><span class="logo-gist">Gist</span><span class="logo-viz">Vis</span></div>
    <span class="separator">|</span>
    <span id="gist-id" style="font-family:monospace; color: #e1e4e8; font-size: 12px;"></span>
    <span id="file-count"></span>
    <div style="flex-grow: 1;"></div>
    <a href="#" id="github-link" target="_blank">GitHub</a>
  </div>

  <div class="main-container">
    <div id="sidebar"><ul id="fileList"></ul></div>
    <div id="content"><div class="content-wrapper">Loading...</div></div>
  </div>

  <script>
    function getExt(filename) {
      if (!filename) return '';
      const parts = filename.split('.');
      return parts.length > 1 ? parts.pop().toLowerCase() : '';
    }

    // Función para detectar si el contenido es una imagen base64
    function isBase64Image(content) {
      if (!content || typeof content !== 'string') return false;
      const trimmed = content.trim();
      // Detecta data:image/png;base64, o data:image/jpeg;base64, etc.
      if (/^data:image\/\w+;base64,/.test(trimmed)) return true;
      // Detecta base64 puro que comienza con firma PNG, JPEG o GIF
      const firstChars = trimmed.substring(0, 30);
      if (/^iVBORw0KGgo/.test(firstChars)) return true;  // PNG
      if (/^\/9j\/4AAQSkZ/.test(firstChars)) return true; // JPEG
      if (/^R0lGODlh/.test(firstChars)) return true;      // GIF
      return false;
    }

    // Convierte contenido base64 a una URL de imagen válida
    function getBase64ImageUrl(content) {
      const trimmed = content.trim();
      // Si ya tiene el formato data:image, lo devuelve directamente
      if (/^data:image\/\w+;base64,/.test(trimmed)) {
        return trimmed;
      }
      // Si es base64 puro, agrega el prefijo correspondiente según la firma
      if (/^iVBORw0KGgo/.test(trimmed)) {
        return 'data:image/png;base64,' + trimmed;
      }
      if (/^\/9j\/4AAQSkZ/.test(trimmed)) {
        return 'data:image/jpeg;base64,' + trimmed;
      }
      if (/^R0lGODlh/.test(trimmed)) {
        return 'data:image/gif;base64,' + trimmed;
      }
      return null;
    }

    async function loadGist() {
      const params = new URLSearchParams(window.location.search);
      const gistId = params.get("id");

      if (!gistId) {
        document.getElementById("content").innerHTML = "<h2>Welcome</h2><p>Add <code>?id=YOUR_GIST_ID</code> to the URL to view files.</p>";
        return;
      }

      document.getElementById("gist-id").innerText = gistId;
      document.getElementById("github-link").href = `https://gist.github.com/${gistId}`;

      try {
        const response = await fetch(`https://api.github.com/gists/${gistId}`);
        if (!response.ok) throw new Error("Gist not found.");
        const gist = await response.json();

        const fileListContainer = document.getElementById("fileList");
        const files = Object.values(gist.files || {});

        files.sort((a, b) => {
          const aName = (a.filename || '').toLowerCase();
          const bName = (b.filename || '').toLowerCase();
          if (aName.startsWith("readme")) return -1;
          if (bName.startsWith("readme")) return 1;
          return aName.localeCompare(bName);
        });

        document.getElementById("file-count").innerText = `${files.length} file(s)`;
        fileListContainer.innerHTML = "";

        files.forEach((file, index) => {
          const li = document.createElement("li");
          li.textContent = file.filename || "(untitled)";
          li.onclick = () => {
            document.querySelectorAll('#sidebar li').forEach(l => l.classList.remove('active'));
            li.classList.add('active');
            renderFile(file);
            
            if (window.innerWidth <= 768) {
                document.getElementById('content').scrollIntoView({ behavior: 'smooth' });
            }
          };
          fileListContainer.appendChild(li);
          if (index === 0) {
            li.classList.add('active');
            renderFile(file);
          }
        });

      } catch (error) {
        document.getElementById("content").innerText = "Error: " + error.message;
      }
    }

    async function getFileContent(file) {
      if (file.truncated) {
        const response = await fetch(file.raw_url);
        return await response.text();
      }
      return file.content || "";
    }

    async function renderFile(file) {
      const wrapper = document.querySelector(".content-wrapper");
      const ext = getExt(file.filename);
      const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp'];

      wrapper.innerHTML = "Cargando archivo...";

      try {
        const content = await getFileContent(file);

        // Verificar si es imagen por extensión
        if (imageExts.includes(ext)) {
          wrapper.innerHTML = `<img src="${file.raw_url}" alt="${file.filename}">`;
          return;
        }

        // NUEVO: Verificar si el contenido es una imagen base64
        if (isBase64Image(content)) {
          const imgUrl = getBase64ImageUrl(content);
          if (imgUrl) {
            wrapper.innerHTML = `<img src="${imgUrl}" alt="${file.filename}">`;
            return;
          }
        }

        if (file.language === "Markdown" || ext === 'md') {
          wrapper.innerHTML = `<div class="markdown-body">${marked.parse(content)}</div>`;
          wrapper.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
          return;
        }

        const pre = document.createElement("pre");
        const code = document.createElement("code");
        code.textContent = content;
        if (file.language) { code.className = `language-${file.language.toLowerCase()}`; }
        pre.appendChild(code);
        wrapper.innerHTML = "";
        wrapper.appendChild(pre);
        hljs.highlightElement(code);
      } catch (err) {
        wrapper.innerHTML = `<p style="color:red">Error al cargar contenido: ${err.message}</p>`;
      }
    }

    loadGist();
  </script>
</body>
</html>
