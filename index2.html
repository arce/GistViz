<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GistVis - Editor & Compiler (browsercc)</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script>
    // Caches the ~90MB Clang/LLVM WASM toolchain (browsercc) in Cache
    // Storage via a service worker, so it only downloads once per browser -
    // reloading the page, or visiting again later, reuses the cached copy
    // instead of re-fetching it. No-ops on file:// or plain http hosting,
    // since service workers require a secure context (https or localhost).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((err) => {
          console.warn('No se pudo registrar el service worker de cache del compilador:', err);
        });
      });
    }
  </script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; flex-direction: column; color: #24292e; background: #f6f8fa; }
    
    #topbar { background: #24292e; color: white; padding: 10px 15px; font-size: 14px; display: flex; gap: 15px; flex-shrink: 0; align-items: center; border-bottom: 1px solid #444; flex-wrap: wrap; z-index: 10; }
    .logo-gist { color: #3498db; } .logo-viz { color: #2ecc71; } .logo-container { font-size: 18px; font-weight: bold; margin-right: 5px; }
    #topbar a { color: #adb5bd; text-decoration: none; font-size: 12px; } #topbar a:hover { color: white; text-decoration: underline; }
    .compiler-status { font-size: 11px; color: #8b949e; margin-left: 10px; }
    .compiler-status.ready { color: #2ea44f; }
    .compiler-status.loading { color: #f0b400; }
    .compiler-status.idle { color: #8b949e; }
    
    .main-container { display: flex; flex: 1; overflow: hidden; flex-direction: row; }
    
    #sidebar { width: 220px; background: #f6f8fa; border-right: 1px solid #e1e4e8; overflow-y: auto; flex-shrink: 0; }
    #sidebar ul { list-style: none; padding: 0; margin: 0; }
    #sidebar li { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #e1e4e8; font-size: 12px; font-family: monospace; color: #0366d6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #sidebar li:hover { background: #ebf0f4; } #sidebar li.active { background: #fff; border-left: 4px solid #3498db; color: #24292e; font-weight: bold; }
    
    #content { flex: 1; padding: 20px; overflow: hidden; background: white; display: flex; flex-direction: column; }
    .content-wrapper { flex: 1; width: 100%; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
    
    .adaptive-iframe { width: 100%; flex: 1; min-height: 500px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
    
    /* Editor styles */
    .editor-container { display: flex; flex-direction: column; height: 100%; min-height: 500px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fafbfc; }
    .editor-toolbar { background: #f6f8fa; padding: 8px 12px; border-bottom: 1px solid #ddd; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .editor-toolbar button { padding: 6px 14px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .editor-toolbar button:hover { background: #f0f2f4; border-color: #bbb; }
    .editor-toolbar button.primary { background: #2ea44f; color: white; border-color: #2ea44f; }
    .editor-toolbar button.primary:hover { background: #2c974b; border-color: #2c974b; }
    .editor-toolbar button.danger { background: #d73a49; color: white; border-color: #d73a49; }
    .editor-toolbar button.danger:hover { background: #cb2431; border-color: #cb2431; }
    .editor-toolbar button.compile { background: #0366d6; color: white; border-color: #0366d6; }
    .editor-toolbar button.compile:hover { background: #0256b3; border-color: #0256b3; }
    .editor-toolbar button.compile:disabled { opacity: 0.5; cursor: not-allowed; }
    .editor-toolbar .filename-display { font-family: monospace; font-size: 13px; color: #586069; }
    
    .editor-main { display: flex; flex: 1; overflow: hidden; }
    .editor-textarea { flex: 1; padding: 16px; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 14px; border: none; outline: none; resize: none; background: #fafbfc; line-height: 1.6; tab-size: 2; overflow: auto; }
    .editor-textarea:focus { background: white; }
    
    .editor-output { flex: 1; padding: 16px; background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 13px; overflow: auto; border-left: 1px solid #ddd; white-space: pre-wrap; word-wrap: break-word; min-height: 300px; }
    .editor-output .error { color: #f48771; }
    .editor-output .success { color: #6a9955; }
    .editor-output .info { color: #569cd6; }
    .editor-output .warn { color: #d4a72c; }
    
    .editor-status { padding: 6px 12px; background: #f6f8fa; border-top: 1px solid #ddd; font-size: 12px; color: #586069; display: flex; justify-content: space-between; }
    .editor-status .modified { color: #d73a49; font-weight: bold; }
    .editor-status .saved { color: #28a745; font-weight: bold; }
    .editor-status .info { color: #0366d6; }
    
    pre { background: #f6f8fa; padding: 12px; border-radius: 6px; border: 1px solid #dfe1e4; overflow: auto; margin: 0; }
    img { max-width: 100%; height: auto; border: 1px solid #ddd; border-radius: 4px; display: block; margin: 10px 0; background: #fff; }
    .separator { color: #444; } #file-count { color: #8b949e; font-size: 12px; }
    
    .markdown-body h1, .markdown-body h2 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 0; }
    .markdown-body p { line-height: 1.5; }

    /* Compiler loading overlay */
    .compiler-loading { display: flex; align-items: center; justify-content: center; padding: 20px; background: #f8f9fa; border-radius: 8px; margin: 10px 0; flex-direction: column; }
    .compiler-loading .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0366d6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    .compiler-loading .progress { width: 300px; max-width: 80%; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; }
    .compiler-loading .progress-bar { height: 100%; background: #0366d6; width: 0%; transition: width 0.3s; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .main-container { flex-direction: column; }
      #sidebar { width: 100%; height: 150px; border-right: none; border-bottom: 1px solid #e1e4e8; }
      #topbar #gist-id { display: none; }
      #content { padding: 15px; }
      .adaptive-iframe { min-height: 70vh; }
      .editor-container { min-height: 70vh; }
      .editor-main { flex-direction: column; }
      .editor-output { min-height: 200px; border-left: none; border-top: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <div id="topbar">
    <div class="logo-container"><span class="logo-gist">Gist</span><span class="logo-viz">Vis</span></div>
    <span class="separator">|</span>
    <span id="gist-id" style="font-family:monospace; color: #e1e4e8; font-size: 12px;"></span>
    <span id="file-count"></span>
    <span id="compilerStatus" class="compiler-status idle">💤 Compiler: en espera (se activa al abrir un .c/.cpp)</span>
    <div style="flex-grow: 1;"></div>
    <a href="#" id="github-link" target="_blank">GitHub</a>
  </div>

  <div class="main-container">
    <div id="sidebar"><ul id="fileList"></ul></div>
    <div id="content"><div class="content-wrapper">Loading...</div></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "browsercc": "https://cdn.jsdelivr.net/npm/browsercc@0.1.1/dist/index.js",
        "@bjorn3/browser_wasi_shim": "https://cdn.jsdelivr.net/npm/@bjorn3/browser_wasi_shim@0.4.2/dist/index.js"
      }
    }
  </script>

  <script type="module">
    // ============================================
    // BROWSERCC COMPILER INTEGRATION
    // ============================================
    // NOTE: browsercc@0.1.3 does not exist (latest published version is 0.1.1),
    // and the package has no "init" export - only "compile". The old code was
    // importing a non-existent module + a non-existent named export, which makes
    // the browser fail to link this <script type="module"> block at all, so
    // none of its code (including the gist/file loading) ever ran. Fixed to use
    // the real API: compile({ source, fileName, flags }) => { compileOutput, module }.
    // Running the compiled WebAssembly module (to capture stdout/stderr) requires
    // a WASI runtime, which browsercc doesn't provide - using @bjorn3/browser_wasi_shim
    // as recommended in the browsercc docs.
    import { compile } from 'browsercc';
    import { WASI, File, OpenFile, ConsoleStdout } from '@bjorn3/browser_wasi_shim';

    let compilerReady = false;
    let compilerInitializing = false;

    // Warm up the browsercc compiler. browsercc has no explicit "init" step -
    // it lazily downloads the clang/lld wasm binaries and sysroot (~90MB total)
    // on the first compile() call - so we trigger that here with a throwaway
    // compile instead of waiting for the user's first real click.
    async function ensureCompiler() {
      if (compilerReady) return true;
      if (compilerInitializing) {
        // Wait for the in-flight initialization to complete
        return new Promise((resolve, reject) => {
          const check = setInterval(() => {
            if (compilerReady) {
              clearInterval(check);
              resolve(true);
            } else if (!compilerInitializing) {
              clearInterval(check);
              reject(new Error('Compiler initialization failed'));
            }
          }, 100);
        });
      }

      compilerInitializing = true;
      const statusEl = document.getElementById('compilerStatus');

      try {
        statusEl.textContent = '⏳ Compiler: Descargando toolchain (~90MB, puede tardar)...';
        statusEl.className = 'compiler-status loading';

        // Show download progress (indeterminate - browsercc exposes no progress API)
        const wrapper = document.querySelector(".content-wrapper");
        let interval = null;
        const progressBar = wrapper && wrapper.querySelector('.progress-bar');
        if (progressBar) {
          let progress = 0;
          interval = setInterval(() => {
            progress += Math.random() * 5;
            if (progress > 90) progress = 90;
            progressBar.style.width = progress + '%';
          }, 200);
        }

        try {
          await compile({ source: 'int main(){return 0;}', fileName: 'warmup.c', flags: ['-std=c11'] });
        } finally {
          if (interval) clearInterval(interval);
          if (progressBar) progressBar.style.width = '100%';
        }

        compilerReady = true;
        compilerInitializing = false;
        statusEl.textContent = '✅ Compiler: Listo';
        statusEl.className = 'compiler-status ready';
        return true;
      } catch (error) {
        console.error('Compiler initialization error:', error);
        compilerInitializing = false;
        statusEl.textContent = '❌ Compiler: Error';
        statusEl.className = 'compiler-status';
        throw error;
      }
    }

    // Compile C/C++ code using browsercc, then execute the resulting
    // WebAssembly module through a WASI shim so we can capture stdout/stderr.
    async function compileCode(code, filename) {
      if (!compilerReady) {
        await ensureCompiler();
      }

      const ext = getExt(filename);
      const isCpp = ext === 'cpp' || ext === 'cc' || ext === 'cxx';

      try {
        const { compileOutput, module } = await compile({
          source: code,
          fileName: filename,
          flags: ['-std=' + (isCpp ? 'c++17' : 'c11'), '-O2']
        });

        if (!module) {
          // Compilation itself failed - compileOutput holds the compiler diagnostics
          return {
            output: '',
            error: compileOutput || 'Compilation failed',
            success: false
          };
        }

        // Run the compiled program under WASI and capture its output
        let stdout = '';
        let stderr = '';
        const fds = [
          new OpenFile(new File([])),                                   // stdin
          new ConsoleStdout(data => { stdout += new TextDecoder().decode(data); }), // stdout
          new ConsoleStdout(data => { stderr += new TextDecoder().decode(data); }), // stderr
        ];
        const wasi = new WASI([], [], fds);

        let exitCode = 0;
        try {
          const instance = await WebAssembly.instantiate(module, {
            wasi_snapshot_preview1: wasi.wasiImport
          });
          exitCode = wasi.start(instance);
        } catch (runErr) {
          stderr += (stderr ? '\n' : '') + '[runtime error] ' + runErr.message;
          exitCode = 1;
        }

        let error = compileOutput && compileOutput.trim() ? compileOutput.trim() : '';
        if (stderr) error += (error ? '\n' : '') + stderr;

        return {
          output: stdout,
          error,
          success: exitCode === 0
        };
      } catch (error) {
        return {
          output: '',
          error: error.message || 'Compilation failed',
          success: false
        };
      }
    }

    // ============================================
    // GIST VISUALIZATION
    // ============================================
    let currentObjectUrl = null;
    let currentFile = null;
    let originalContent = '';
    let isModified = false;

    const CODE_EXTS = ['cpp', 'php', 'py', 'js', 'java', 'c', 'h', 'rb', 'go', 'rs', 'ts', 'jsx', 'tsx', 'vue', 'css', 'scss', 'less', 'json', 'xml', 'yaml', 'yml', 'sql', 'sh', 'bash'];
    const COMPILE_EXTS = ['c', 'cpp', 'cc', 'cxx'];

    function getExt(filename) {
      if (!filename) return '';
      const parts = filename.split('.');
      return parts.length > 1 ? parts.pop().toLowerCase() : '';
    }

    function isCodeFile(ext) {
      return CODE_EXTS.includes(ext);
    }

    function isCompilable(ext) {
      return COMPILE_EXTS.includes(ext);
    }

    function getLanguageFromExt(ext) {
      const map = {
        'cpp': 'cpp', 'c': 'c', 'h': 'c', 'php': 'php', 'py': 'python',
        'js': 'javascript', 'jsx': 'javascript', 'ts': 'typescript', 'tsx': 'typescript',
        'java': 'java', 'rb': 'ruby', 'go': 'go', 'rs': 'rust', 'vue': 'vue',
        'css': 'css', 'scss': 'scss', 'less': 'less', 'json': 'json',
        'xml': 'xml', 'yaml': 'yaml', 'yml': 'yaml', 'sql': 'sql',
        'sh': 'bash', 'bash': 'bash'
      };
      return map[ext] || ext;
    }

    async function loadGist() {
      const params = new URLSearchParams(window.location.search);
      const gistId = params.get("id");

      if (!gistId) {
        document.querySelector(".content-wrapper").innerHTML = "<h2>Welcome</h2><p>Add <code>?id=YOUR_GIST_ID</code> to the URL to view files.</p>";
        return;
      }

      document.getElementById("gist-id").innerText = gistId;
      document.getElementById("github-link").href = `https://gist.github.com/${gistId}`;

      try {
        const response = await fetch(`https://api.github.com/gists/${gistId}`);
        if (!response.ok) throw new Error("Gist not found.");
        const gist = await response.json();

        const fileListContainer = document.getElementById("fileList");
        const files = Object.values(gist.files || {});

        files.sort((a, b) => {
          const aName = (a.filename || '').toLowerCase();
          const bName = (b.filename || '').toLowerCase();
          if (aName.startsWith("readme")) return -1;
          if (bName.startsWith("readme")) return 1;
          return aName.localeCompare(bName);
        });

        document.getElementById("file-count").innerText = `${files.length} file(s)`;
        fileListContainer.innerHTML = "";

        files.forEach((file, index) => {
          const li = document.createElement("li");
          li.textContent = file.filename || "(untitled)";
          li.onclick = () => {
            document.querySelectorAll('#sidebar li').forEach(l => l.classList.remove('active'));
            li.classList.add('active');
            renderFile(file);
            if (window.innerWidth <= 768) {
                document.getElementById('content').scrollIntoView({ behavior: 'smooth' });
            }
          };
          fileListContainer.appendChild(li);
          if (index === 0) {
            li.classList.add('active');
            renderFile(file);
          }
        });

      } catch (error) {
        document.querySelector(".content-wrapper").innerText = "Error: " + error.message;
      }
    }

    async function getFileContent(file) {
      if (file.truncated) {
        const response = await fetch(file.raw_url);
        return await response.text();
      }
      return file.content || "";
    }

    function createEditor(file, content) {
      const ext = getExt(file.filename);
      const lang = getLanguageFromExt(ext);
      const isCompilableFile = isCompilable(ext);
      
      const container = document.createElement('div');
      container.className = 'editor-container';
      
      // Toolbar
      const toolbar = document.createElement('div');
      toolbar.className = 'editor-toolbar';
      toolbar.innerHTML = `
        <span class="filename-display">📄 ${file.filename}</span>
        <span style="flex:1"></span>
        ${isCompilableFile ? `<button class="compile" id="compileBtn">🔨 Compile & Run</button>` : ''}
        <button class="primary" id="saveBtn">💾 Save</button>
        <button id="revertBtn">↩️ Revert</button>
        <button id="copyBtn">📋 Copy</button>
        <button class="danger" id="resetBtn">🔄 Reset</button>
      `;
      container.appendChild(toolbar);
      
      // Main area: editor + output
      const mainArea = document.createElement('div');
      mainArea.className = 'editor-main';
      
      // Textarea
      const textarea = document.createElement('textarea');
      textarea.className = 'editor-textarea';
      textarea.value = content;
      textarea.spellcheck = false;
      textarea.style.tabSize = '2';
      mainArea.appendChild(textarea);
      
      // Output panel
      const outputDiv = document.createElement('div');
      outputDiv.className = 'editor-output';
      outputDiv.id = 'outputPanel';
      outputDiv.textContent = '📝 Compilation output will appear here...';
      mainArea.appendChild(outputDiv);
      
      container.appendChild(mainArea);
      
      // Status bar
      const status = document.createElement('div');
      status.className = 'editor-status';
      status.innerHTML = `
        <span>${lang || 'text'}</span>
        <span id="statusText" class="saved">✓ Saved</span>
        <span id="lineCount">Lines: ${content.split('\n').length}</span>
      `;
      container.appendChild(status);
      
      // Event listeners
      const statusText = status.querySelector('#statusText');
      const saveBtn = toolbar.querySelector('#saveBtn');
      const revertBtn = toolbar.querySelector('#revertBtn');
      const copyBtn = toolbar.querySelector('#copyBtn');
      const resetBtn = toolbar.querySelector('#resetBtn');
      const compileBtn = toolbar.querySelector('#compileBtn');
      // Use the element reference directly - document.getElementById would
      // return null here since this editor isn't attached to the DOM yet
      // (renderFile() appends it after createEditor() returns).
      const outputPanel = outputDiv;
      
      let hasChanges = false;
      
      textarea.addEventListener('input', () => {
        hasChanges = textarea.value !== originalContent;
        statusText.textContent = hasChanges ? '✏️ Modified' : '✓ Saved';
        statusText.className = hasChanges ? 'modified' : 'saved';
        updateLineCount();
      });
      
      function updateLineCount() {
        const lines = textarea.value.split('\n').length;
        status.querySelector('#lineCount').textContent = `Lines: ${lines}`;
      }
      
      // Save (download)
      saveBtn.addEventListener('click', () => {
        const blob = new Blob([textarea.value], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        originalContent = textarea.value;
        statusText.textContent = '✓ Saved';
        statusText.className = 'saved';
        hasChanges = false;
      });
      
      // Revert
      revertBtn.addEventListener('click', () => {
        if (hasChanges && confirm('¿Revertir todos los cambios?')) {
          textarea.value = originalContent;
          hasChanges = false;
          statusText.textContent = '✓ Saved';
          statusText.className = 'saved';
          updateLineCount();
          outputPanel.textContent = '📝 Compilation output will appear here...';
          outputPanel.className = 'editor-output';
        } else if (!hasChanges) {
          alert('No hay cambios para revertir.');
        }
      });
      
      // Copy
      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(textarea.value);
          copyBtn.textContent = '✅ Copied!';
          setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
        } catch (err) {
          textarea.select();
          document.execCommand('copy');
          copyBtn.textContent = '✅ Copied!';
          setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
        }
      });
      
      // Reset
      resetBtn.addEventListener('click', async () => {
        if (confirm('¿Recargar el contenido original desde GitHub?')) {
          try {
            const freshContent = await getFileContent(file);
            textarea.value = freshContent;
            originalContent = freshContent;
            hasChanges = false;
            statusText.textContent = '✓ Saved';
            statusText.className = 'saved';
            updateLineCount();
            outputPanel.textContent = '📝 Compilation output will appear here...';
            outputPanel.className = 'editor-output';
          } catch (err) {
            alert('Error al recargar: ' + err.message);
          }
        }
      });
      
      // Compile
      if (compileBtn) {
        compileBtn.addEventListener('click', async () => {
          const code = textarea.value;
          outputPanel.textContent = '🔨 Compiling...';
          outputPanel.className = 'editor-output info';
          compileBtn.disabled = true;
          compileBtn.textContent = '⏳ Compiling...';
          
          try {
            // Ensure compiler is ready
            await ensureCompiler();
            
            // Compile and run
            const result = await compileCode(code, file.filename);
            
            let output = '';
            if (result.error) {
              output += '❌ Compilation Error:\n' + result.error + '\n';
            }
            if (result.output) {
              output += '✅ Program Output:\n' + result.output;
            }
            if (!result.output && !result.error && result.success) {
              output = '✅ Compilation successful! No output.';
            }
            
            outputPanel.textContent = output || '✅ Compilation successful!';
            outputPanel.className = 'editor-output ' + (result.error || !result.success ? 'error' : 'success');
          } catch (error) {
            outputPanel.textContent = '❌ Error during compilation: ' + error.message;
            outputPanel.className = 'editor-output error';
          } finally {
            compileBtn.disabled = false;
            compileBtn.textContent = '🔨 Compile & Run';
          }
        });
      }
      
      // Keyboard shortcuts
      textarea.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 's') {
          e.preventDefault();
          saveBtn.click();
        }
        if (e.ctrlKey && e.key === 'Enter' && compileBtn) {
          e.preventDefault();
          compileBtn.click();
        }
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = textarea.selectionStart;
          const end = textarea.selectionEnd;
          const spaces = '  ';
          textarea.value = textarea.value.substring(0, start) + spaces + textarea.value.substring(end);
          textarea.selectionStart = textarea.selectionEnd = start + spaces.length;
          textarea.dispatchEvent(new Event('input'));
        }
      });
      
      return container;
    }

    async function renderFile(file) {
      const wrapper = document.querySelector(".content-wrapper");
      const ext = getExt(file.filename);
      const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'webp'];

      wrapper.innerHTML = "Loading file...";

      try {
        const content = await getFileContent(file);
        const trimmedContent = content.trim();
        currentFile = file;
        originalContent = content;

        if (currentObjectUrl) { URL.revokeObjectURL(currentObjectUrl); }

        if (ext === 'html' || ext === 'svg') {
          const mimeType = ext === 'svg' ? 'image/svg+xml' : 'text/html';
          const blob = new Blob([content], { type: mimeType });
          currentObjectUrl = URL.createObjectURL(blob);
          
          wrapper.innerHTML = `<iframe src="${currentObjectUrl}" class="adaptive-iframe" sandbox="allow-scripts allow-same-origin" title="${file.filename}"></iframe>`;
          return;
        }

        const base64Regex = /^data:image\/(png|jpg|jpeg|gif|webp|svg\+xml);base64,/;
        
        if (base64Regex.test(trimmedContent)) {
          wrapper.innerHTML = `<img src="${trimmedContent}" alt="${file.filename}">`;
          return;
        }

        if (imageExts.includes(ext)) {
          wrapper.innerHTML = `<img src="${file.raw_url}" alt="${file.filename}">`;
          return;
        }

        if (file.language === "Markdown" || ext === 'md') {
          wrapper.innerHTML = `<div class="markdown-body">${marked.parse(content)}</div>`;
          wrapper.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
          return;
        }

        // Check if it's a compilable file (C/C++)
        if (isCompilable(ext)) {
          const editor = createEditor(file, content);
          wrapper.innerHTML = '';
          wrapper.appendChild(editor);
          // Lazily warm up the compiler only when a compilable file is
          // actually opened, instead of downloading ~90MB on every page
          // load regardless of whether the user ever compiles anything.
          if (!compilerReady && !compilerInitializing) {
            ensureCompiler().catch(console.error);
          }
          return;
        }

        // Check if it's a code file for editing
        if (isCodeFile(ext)) {
          const editor = createEditor(file, content);
          wrapper.innerHTML = '';
          wrapper.appendChild(editor);
          return;
        }

        // Default: show as code with syntax highlighting
        const pre = document.createElement("pre");
        const code = document.createElement("code");
        code.textContent = content;
        if (file.language) { code.className = `language-${file.language.toLowerCase()}`; }
        pre.appendChild(code);
        wrapper.innerHTML = "";
        wrapper.appendChild(pre);
        hljs.highlightElement(code);
      } catch (err) {
        wrapper.innerHTML = `<p style="color:red">Error loading content: ${err.message}</p>`;
      }
    }

    loadGist();
  </script>
</body>
</html>
